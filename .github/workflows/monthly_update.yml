name: Monthly Tech Trend Update

on:
  schedule:
    # Runs at 00:00 on the 5th day of every month (to ensure the HN thread is up)
    - cron: "0 0 5 * *"
  workflow_dispatch: # Allows you to run it manually via the GitHub UI

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_lg

      - name: Step 1 - Ingest Raw Data
        run: python src/extraction/extract.py

      - name: Step 2 - Transform (NLP & ESCO)
        run: python src/transformation/transform.py

      - name: Step 3 - Normalize & Clean
        run: python src/transformation/normalizer.py

      - name: Step 4 - Aggregate & Forecaster
        run: |
          python src/prediction/aggregator.py
          python src/prediction/forecaster.py

      - name: Commit and Push Updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are actually files to add to avoid errors
          git add data/analysis/*.csv || echo "No new analysis files found"

          # Only commit if there are changes (prevents empty commit errors)
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automated monthly trend update [$(date +'%Y-%m')]"
            git push
          else
            echo "No changes to commit"
          fi
